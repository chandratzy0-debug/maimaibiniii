<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Booting...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Courier New", monospace;
    }

    body {
      background: #050816;
      color: #00ffb3;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 90%;
      max-width: 700px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #00ffb3;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0,255,179,0.25);
    }

    .terminal-line {
      margin: 10px 0;
      opacity: 0;
      animation: fadeIn 0.6s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .progress-box {
      margin-top: 25px;
      border: 1px solid #00ffb3;
      height: 24px;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #00ffb3;
      animation: load 5s forwards;
    }

    @keyframes load {
      to {
        width: 100%;
      }
    }
